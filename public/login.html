<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bintang Florist — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #FAF5FF 0%, #FFF0F7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(139,63,168,0.15);
    border: 1px solid #E8D5F5;
    text-align: center;
  }
  .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .brand { font-size: 1.5rem; font-weight: 700; color: #8B3FA8; margin-bottom: 4px; }
  .sub { font-size: 0.72rem; color: #9B7BB5; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 32px; }
  input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1.5px solid #E8D5F5;
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #8B3FA8; }
  button {
    width: 100%;
    padding: 12px;
    background: #8B3FA8;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  button:hover { background: #7A2E97; }
  button:disabled { background: #C9A8D8; cursor: not-allowed; }
  .error { color: #C0166A; font-size: 0.8rem; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🌸</div>
  <div class="brand">Bintang Florist</div>
  <div class="sub">Order Dashboard</div>

  <form id="form">
    <input type="password" id="pw" placeholder="Masukkan password" autofocus />
    <div class="error" id="err">Password salah. Coba lagi.</div>
    <button type="submit" id="btn">Masuk →</button>
  </form>
</div>

<script>
  document.getElementById('form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const pw = document.getElementById('pw').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    
    btn.disabled = true;
    btn.textContent = 'Masuk…';
    err.style.display = 'none';

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });

    if (res.ok) {
      window.location.href = '/';
    } else {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Masuk →';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });
</script>
</body>
</html>
